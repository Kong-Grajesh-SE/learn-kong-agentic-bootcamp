# =============================================================================
# Agentic AI Bootcamp - Docker Compose
# Kong Gateway 3.14+ (Enterprise) + MCP Backend
# =============================================================================
# NOTE: Keycloak is NOT in this compose file. The bootcamp uses ONE shared
# Keycloak (realm `bootcamp`) for every module - start it from the repo root:
#     cd ../keycloak && docker compose up -d
# Kong's OAuth2 plugin reaches it via `host.docker.internal:8080` (see
# deck/05-mcp-oauth2.yaml).
# =============================================================================
services:
  # NOTE: Kong Gateway is NOT in this compose file.
  # Kong is already running in hybrid mode (connected to Konnect).
  # Connect Kong to this network with: docker network connect mcp-a2a_kong-net <kong-dp>

  # ── MCP Travel Backend ──────────────────────────────────────────────────
  mcp-backend:
    build: ./mcp-server
    container_name: mcp-backend
    ports:
      - "3001:3001"
    networks:
      - kong-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── MCP Tool Server (Step 7) ──────────────────────────────────────────────
  # Sample MCP server with safe tools (get_weather, calculator, search_docs)
  # and deliberately dangerous tools (execute_shell, drop_database) for the
  # OPA authorization demo. OPA blocks the dangerous tools at the gateway
  # before they reach this server.
  mcp-tool-server:
    build: ./services/mcp-tool-server
    container_name: mcp-tool-server
    ports:
      - "8092:8090"
    networks:
      - kong-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── OPA Policy Service / PDP (Step 7) ───────────────────────────────────
  # External Policy Decision Point called by the Kong OPA plugin.
  # Exposes /v1/data/mcp/authz/allow (OPA-compatible) that checks:
  #   1. MCP method allowlist
  #   2. Tool blocklist (execute_shell, drop_database, …)
  #   3. Dangerous argument patterns (rm -rf, DROP TABLE, …)
  opa-policy-service:
    build: ./services/opa-policy-service
    container_name: opa-policy-service
    ports:
      - "8089:8080"
    networks:
      - kong-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  kong-net:
    driver: bridge
