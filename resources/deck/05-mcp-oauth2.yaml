# =============================================================================
# Step 05 - MCP + OAuth2 / PKCE
# Creates a second MCP service (with /mcp path prefix) and route that
# requires OAuth2 tokens validated against Keycloak. The ai-mcp-oauth2
# plugin handles MCP OAuth 2.0 spec validation; ai-mcp-proxy in
# passthrough-listener mode forwards the authenticated request.
#
# Prerequisites: the shared Keycloak running at localhost:8080 with the
# `bootcamp` realm - start it with `cd ../keycloak && docker compose up -d`.
# =============================================================================
_format_version: "3.0"

services:
  - name: mcp-backend-oauth
    host: mcp-backend
    port: 3001
    protocol: http
    path: /mcp
    tags:
      - mcp
      - oauth
    routes:
      - name: mcp-oauth
        paths:
          - /mcp-oauth
        methods:
          - POST
          - GET
        strip_path: true
        tags:
          - oauth2
        plugins:
          - name: ai-mcp-oauth2
            config:
              resource: http://localhost:8000/mcp-oauth/tools
              authorization_servers:
                - http://localhost:8080/realms/bootcamp
              # JWKS is fetched from inside the Kong DP container, which can't
              # see `localhost` - it reaches the shared Keycloak on the host via
              # `host.docker.internal`.
              jwks_endpoint: http://host.docker.internal:8080/realms/bootcamp/protocol/openid-connect/certs
              # DEMO ONLY - relaxes RFC 8707 audience binding so a token issued
              # without an explicit `audience` claim still validates. Do NOT
              # ship this to production: pair the IdP-side resource indicator
              # with strict validation instead.
              insecure_relaxed_audience_validation: true
              # DEMO ONLY - Keycloak runs over plain HTTP on localhost.
              ssl_verify: false
              claim_to_header:
                - claim: sub
                  header: X-User-Id
                - claim: preferred_username
                  header: X-User-Name
          - name: ai-mcp-proxy
            config:
              mode: passthrough-listener
