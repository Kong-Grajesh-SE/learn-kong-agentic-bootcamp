#
# Shared Keycloak for the Kong Konnect Bootcamp.
#
# One Keycloak instance, one realm (`bootcamp`), serving every module that needs
# an external OpenID Connect / OAuth2 provider:
#   • 01-api-gateway  → step 16 (OIDC with Keycloak): clients `kong`, `kong-m2m`;
#                       users alice / bob-admin
#   • 05-mcp-a2a       → step 5 (MCP + OAuth2/PKCE): clients `mcp-service-client`,
#                       `mcp-pkce-client`; user agent-user
#
# Run (from the repo root):
#   cd keycloak
#   docker compose up -d
#   open http://localhost:8080                              # Admin: admin / admin
#   open http://localhost:8080/realms/bootcamp/account      # User: alice / alice-password
#
# Stop & wipe:
#   docker compose down -v
#
# Issuer / endpoints (SAME server, two hostnames):
#   • From your host (curl, browser):   http://localhost:8080/realms/bootcamp
#   • From inside a container (Kong DP): http://host.docker.internal:8080/realms/bootcamp
#
# IMPORTANT for module 01 (openid-connect): a token's `iss` must equal the
# issuer Kong validates against. Kong (a container) only reaches Keycloak at
# host.docker.internal, so use host.docker.internal as the single issuer
# everywhere and make your host resolve it (one-time):
#   echo "127.0.0.1 host.docker.internal" | sudo tee -a /etc/hosts
# See README.md → "Issuer & host resolution".
#
# Verify it's up:
#   curl -s http://host.docker.internal:8080/realms/bootcamp/.well-known/openid-configuration | jq .issuer
#   # → "http://host.docker.internal:8080/realms/bootcamp"
#
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Dev mode uses an in-memory H2 DB - fine for the bootcamp, not for prod.
    ports:
      - "8080:8080"        # Admin Console + token/discovery endpoints
    volumes:
      - ./realm-bootcamp.json:/opt/keycloak/data/import/realm-bootcamp.json:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
